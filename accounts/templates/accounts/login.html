{% load static %}
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRESS - Connexion</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pg': {
                            'bg':       '#FFFAFA',
                            'surface':  '#FFFFFF',
                            'border':   '#F0EBE6',
                            'accent':   '#6B8F71',
                            'accent-h': '#5A7D60',
                            'text':     '#37352F',
                            'text-s':   '#787774',
                        },
                        'peach':    '#B07D56',
                        'peach-l':  '#FDEBD0',
                        'lavender': '#7B5EA7',
                        'lavender-l': '#E8DAEF',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(240, 235, 230, 0.6);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(107, 143, 113, 0.15);
            border-color: #6B8F71;
        }

        .toast-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body class="h-full bg-[#FFFAFA] font-sans text-pg-text antialiased overflow-hidden relative">

    <!-- Icône café (statique, en haut à gauche) — style dessiné Notion -->
    <svg style="position: absolute; top: 12%; left: 8%; width: 130px; opacity: 0.12;" viewBox="0 0 120 120" fill="none">
        <!-- Tasse -->
        <rect x="20" y="40" width="55" height="50" rx="8" stroke="#B07D56" stroke-width="3" fill="none"/>
        <!-- Anse -->
        <path d="M75 52 Q95 52 95 67 Q95 82 75 82" stroke="#B07D56" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Soucoupe -->
        <ellipse cx="47" cy="95" rx="38" ry="6" stroke="#B07D56" stroke-width="2.5" fill="none"/>
        <!-- Vapeur -->
        <path d="M35 35 Q37 25 35 18" stroke="#B07D56" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M47 32 Q49 22 47 14" stroke="#B07D56" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M59 35 Q61 25 59 18" stroke="#B07D56" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>

    <!-- Icône réveil (statique, en bas à droite) — style dessiné Notion -->
    <svg style="position: absolute; bottom: 10%; right: 8%; width: 140px; opacity: 0.10;" viewBox="0 0 120 120" fill="none">
        <!-- Corps du réveil -->
        <circle cx="60" cy="62" r="35" stroke="#7B5EA7" stroke-width="3" fill="none"/>
        <!-- Centre -->
        <circle cx="60" cy="62" r="2.5" fill="#7B5EA7"/>
        <!-- Aiguille heure -->
        <line x1="60" y1="62" x2="60" y2="42" stroke="#7B5EA7" stroke-width="3" stroke-linecap="round"/>
        <!-- Aiguille minute -->
        <line x1="60" y1="62" x2="75" y2="55" stroke="#7B5EA7" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Pieds -->
        <line x1="35" y1="93" x2="42" y2="87" stroke="#7B5EA7" stroke-width="3" stroke-linecap="round"/>
        <line x1="85" y1="93" x2="78" y2="87" stroke="#7B5EA7" stroke-width="3" stroke-linecap="round"/>
        <!-- Cloches -->
        <circle cx="38" cy="32" r="9" stroke="#7B5EA7" stroke-width="2.5" fill="none"/>
        <circle cx="82" cy="32" r="9" stroke="#7B5EA7" stroke-width="2.5" fill="none"/>
        <!-- Tige entre cloches -->
        <line x1="45" y1="28" x2="60" y2="27" stroke="#7B5EA7" stroke-width="2"/>
        <line x1="75" y1="28" x2="60" y2="27" stroke="#7B5EA7" stroke-width="2"/>
        <!-- Marques heures -->
        <line x1="60" y1="30" x2="60" y2="34" stroke="#7B5EA7" stroke-width="2" stroke-linecap="round"/>
        <line x1="60" y1="90" x2="60" y2="94" stroke="#7B5EA7" stroke-width="2" stroke-linecap="round"/>
        <line x1="28" y1="62" x2="32" y2="62" stroke="#7B5EA7" stroke-width="2" stroke-linecap="round"/>
        <line x1="88" y1="62" x2="92" y2="62" stroke="#7B5EA7" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <!-- Contenu principal -->
    <div class="flex items-center justify-center h-full px-4 relative z-10">

        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-pg-accent rounded-2xl shadow-lg mb-4">
                    <span class="text-white font-bold text-2xl">P</span>
                </div>
                <h1 class="text-3xl font-bold text-pg-text">PROGRESS</h1>
                <p class="text-pg-text-s mt-1 text-sm">Ton espace étudiant cozy</p>
            </div>

            <!-- Glass Card -->
            <div class="glass rounded-2xl p-8">

                <h2 class="text-xl font-semibold text-pg-text mb-1">Connexion</h2>
                <p class="text-sm text-pg-text-s mb-6">Content de te revoir !</p>

                <!-- Error messages -->
                {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                    <div class="toast-enter flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm
                                {% if message.tags == 'error' %}
                                    bg-red-50 text-red-700 border border-red-200
                                {% else %}
                                    bg-green-50 text-green-700 border border-green-200
                                {% endif %}">
                        <span>{{ message }}</span>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1.5">
                            Nom d'utilisateur
                        </label>
                        <input type="text" name="username" required autofocus
                               placeholder="ton.nom"
                               class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                      text-pg-text placeholder-pg-text-s/50 text-sm
                                      transition-all duration-200">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1.5">
                            Mot de passe
                        </label>
                        <input type="password" name="password" required
                               placeholder="••••••••"
                               class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                      text-pg-text placeholder-pg-text-s/50 text-sm
                                      transition-all duration-200">
                    </div>

                    <button type="submit"
                            class="w-full py-2.5 px-4 bg-pg-accent hover:bg-pg-accent-h text-white
                                   font-medium rounded-xl text-sm transition-all duration-200
                                   shadow-sm hover:shadow-md active:scale-[0.98]">
                        Se connecter
                    </button>
                </form>

                <div class="flex items-center my-6">
                    <div class="flex-1 border-t border-pg-border"></div>
                    <span class="px-3 text-xs text-pg-text-s">ou</span>
                    <div class="flex-1 border-t border-pg-border"></div>
                </div>

                <div class="text-center">
                    <p class="text-sm text-pg-text-s">
                        Pas encore de compte ?
                        <a href="{% url 'accounts:register' %}"
                           class="text-pg-accent font-medium hover:text-pg-accent-h hover:underline transition-colors">
                            Créer mon espace
                        </a>
                    </p>
                </div>

            </div>

            <p class="text-center text-xs text-pg-text-s/50 mt-6">
                PROGRESS &mdash; Espace étudiant cozy
            </p>

        </div>
    </div>

</body>
</html>
