{% load static %}
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRESS - Connexion</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pg': {
                            'bg':       '#F9F7F4',
                            'surface':  '#FFFFFF',
                            'border':   '#E8E5E0',
                            'accent':   '#6B8F71',
                            'accent-h': '#5A7D60',
                            'text':     '#37352F',
                            'text-s':   '#787774',
                        },
                    },
                    fontFamily: {
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Glass morphism */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(107, 143, 113, 0.12),
                        0 2px 8px rgba(0, 0, 0, 0.04);
        }

        /* Background gradient cozy */
        .cozy-bg {
            background: linear-gradient(135deg, #F9F7F4 0%, #E8DAEF 25%, #D4E6F1 50%, #D5F5E3 75%, #FDEBD0 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating shapes animation */
        .float-shape {
            position: absolute;
            opacity: 0.15;
            animation: floatUp 20s ease-in-out infinite;
        }

        .float-shape:nth-child(odd) {
            animation-duration: 25s;
            animation-direction: reverse;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33%      { transform: translateY(-20px) rotate(5deg); }
            66%      { transform: translateY(10px) rotate(-3deg); }
        }

        /* Input focus glow */
        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(107, 143, 113, 0.2);
            border-color: #6B8F71;
        }

        /* Toast animation */
        .toast-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body class="h-full cozy-bg font-sans text-pg-text antialiased overflow-hidden relative">

    <!-- ═══ SVG Background Decorations ═══ -->
    <!-- Alarm clock / cute study items -->
    <svg class="float-shape" style="top: 8%; left: 5%; width: 120px;" viewBox="0 0 100 100" fill="#6B8F71">
        <!-- Alarm clock -->
        <circle cx="50" cy="52" r="30" fill="none" stroke="#6B8F71" stroke-width="3"/>
        <circle cx="50" cy="52" r="2" fill="#6B8F71"/>
        <line x1="50" y1="52" x2="50" y2="35" stroke="#6B8F71" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="50" y1="52" x2="62" y2="52" stroke="#6B8F71" stroke-width="2" stroke-linecap="round"/>
        <!-- Clock legs -->
        <line x1="30" y1="78" x2="36" y2="72" stroke="#6B8F71" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="70" y1="78" x2="64" y2="72" stroke="#6B8F71" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Bells -->
        <circle cx="30" cy="28" r="8" fill="none" stroke="#6B8F71" stroke-width="2.5"/>
        <circle cx="70" cy="28" r="8" fill="none" stroke="#6B8F71" stroke-width="2.5"/>
        <line x1="36" y1="24" x2="50" y2="22" stroke="#6B8F71" stroke-width="2"/>
        <line x1="64" y1="24" x2="50" y2="22" stroke="#6B8F71" stroke-width="2"/>
    </svg>

    <!-- Math formulas / shapes -->
    <svg class="float-shape" style="top: 15%; right: 8%; width: 100px;" viewBox="0 0 100 100" fill="none" stroke="#7B5EA7" stroke-width="2">
        <!-- Triangle -->
        <polygon points="50,10 15,80 85,80" stroke-linejoin="round"/>
        <!-- Pi symbol -->
        <text x="38" y="60" fill="#7B5EA7" font-size="24" font-family="serif" stroke="none">&#960;</text>
    </svg>

    <!-- Book -->
    <svg class="float-shape" style="bottom: 20%; left: 8%; width: 90px;" viewBox="0 0 100 100" fill="none" stroke="#5B7FA5" stroke-width="2.5">
        <path d="M20 20 L50 15 L80 20 L80 80 L50 75 L20 80 Z" stroke-linejoin="round"/>
        <line x1="50" y1="15" x2="50" y2="75"/>
        <!-- Pages -->
        <line x1="30" y1="30" x2="45" y2="28" stroke-width="1.5" opacity="0.5"/>
        <line x1="30" y1="40" x2="45" y2="38" stroke-width="1.5" opacity="0.5"/>
        <line x1="30" y1="50" x2="45" y2="48" stroke-width="1.5" opacity="0.5"/>
        <line x1="55" y1="28" x2="70" y2="30" stroke-width="1.5" opacity="0.5"/>
        <line x1="55" y1="38" x2="70" y2="40" stroke-width="1.5" opacity="0.5"/>
        <line x1="55" y1="48" x2="70" y2="50" stroke-width="1.5" opacity="0.5"/>
    </svg>

    <!-- Calculator -->
    <svg class="float-shape" style="bottom: 15%; right: 10%; width: 80px;" viewBox="0 0 80 100" fill="none" stroke="#B07D56" stroke-width="2">
        <rect x="10" y="5" width="60" height="90" rx="8"/>
        <rect x="18" y="12" width="44" height="18" rx="3" fill="#B07D56" opacity="0.15"/>
        <!-- Buttons -->
        <circle cx="26" cy="45" r="5"/><circle cx="40" cy="45" r="5"/><circle cx="54" cy="45" r="5"/>
        <circle cx="26" cy="60" r="5"/><circle cx="40" cy="60" r="5"/><circle cx="54" cy="60" r="5"/>
        <circle cx="26" cy="75" r="5"/><circle cx="40" cy="75" r="5"/><circle cx="54" cy="75" r="5"/>
    </svg>

    <!-- Pencil -->
    <svg class="float-shape" style="top: 50%; left: 3%; width: 70px;" viewBox="0 0 100 100" fill="none" stroke="#A25568" stroke-width="2.5">
        <path d="M75 10 L90 25 L35 80 L15 85 L20 65 Z" stroke-linejoin="round"/>
        <line x1="65" y1="20" x2="80" y2="35"/>
        <path d="M15 85 L20 65 L35 80 Z" fill="#A25568" opacity="0.15"/>
    </svg>

    <!-- Graduation cap -->
    <svg class="float-shape" style="top: 5%; left: 50%; width: 110px;" viewBox="0 0 120 80" fill="none" stroke="#4A7C59" stroke-width="2.5">
        <polygon points="60,5 5,30 60,55 115,30" fill="#4A7C59" opacity="0.1" stroke-linejoin="round"/>
        <line x1="60" y1="55" x2="60" y2="35"/>
        <path d="M30 38 L30 58 Q60 72 90 58 L90 38" stroke-linejoin="round"/>
        <!-- Tassel -->
        <line x1="100" y1="30" x2="100" y2="55"/>
        <circle cx="100" cy="58" r="3" fill="#4A7C59"/>
    </svg>

    <!-- Sum symbol -->
    <svg class="float-shape" style="bottom: 35%; right: 3%; width: 60px;" viewBox="0 0 60 80" fill="none">
        <text x="5" y="60" fill="#7B5EA7" font-size="60" font-family="serif" opacity="1">&#931;</text>
    </svg>

    <!-- Infinity -->
    <svg class="float-shape" style="top: 70%; left: 45%; width: 80px;" viewBox="0 0 100 50" fill="none" stroke="#5B7FA5" stroke-width="2.5">
        <path d="M30 25 C30 10 10 10 10 25 C10 40 30 40 30 25 C30 10 50 10 50 25 Q50 35 60 35 Q70 35 70 25 Q70 15 60 15 Q50 15 50 25" stroke-linecap="round"/>
    </svg>

    <!-- ═══ Main Content ═══ -->
    <div class="flex items-center justify-center h-full px-4 relative z-10">

        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-pg-accent rounded-2xl shadow-lg mb-4">
                    <span class="text-white font-bold text-2xl">P</span>
                </div>
                <h1 class="text-3xl font-bold text-pg-text">PROGRESS</h1>
                <p class="text-pg-text-s mt-1 text-sm">Ton espace etudiant cozy</p>
            </div>

            <!-- Glass Card -->
            <div class="glass rounded-2xl p-8">

                <h2 class="text-xl font-semibold text-pg-text mb-1">Connexion</h2>
                <p class="text-sm text-pg-text-s mb-6">Content de te revoir !</p>

                <!-- Error messages -->
                {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                    <div class="toast-enter flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm
                                {% if message.tags == 'error' %}
                                    bg-red-50 text-red-700 border border-red-200
                                {% else %}
                                    bg-green-50 text-green-700 border border-green-200
                                {% endif %}">
                        <span>{{ message }}</span>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <!-- Username -->
                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1.5">
                            Nom d'utilisateur
                        </label>
                        <input type="text" name="username" required autofocus
                               placeholder="ton.nom"
                               class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                      text-pg-text placeholder-pg-text-s/50 text-sm
                                      transition-all duration-200">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1.5">
                            Mot de passe
                        </label>
                        <input type="password" name="password" required
                               placeholder="••••••••"
                               class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                      text-pg-text placeholder-pg-text-s/50 text-sm
                                      transition-all duration-200">
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                            class="w-full py-2.5 px-4 bg-pg-accent hover:bg-pg-accent-h text-white
                                   font-medium rounded-xl text-sm transition-all duration-200
                                   shadow-md hover:shadow-lg active:scale-[0.98]">
                        Se connecter
                    </button>
                </form>

                <!-- Separator -->
                <div class="flex items-center my-6">
                    <div class="flex-1 border-t border-pg-border/50"></div>
                    <span class="px-3 text-xs text-pg-text-s">ou</span>
                    <div class="flex-1 border-t border-pg-border/50"></div>
                </div>

                <!-- Register link -->
                <div class="text-center">
                    <p class="text-sm text-pg-text-s">
                        Pas encore de compte ?
                        <a href="{% url 'accounts:register' %}"
                           class="text-pg-accent font-medium hover:text-pg-accent-h hover:underline transition-colors">
                            Creer mon espace
                        </a>
                    </p>
                </div>

            </div>

            <!-- Footer -->
            <p class="text-center text-xs text-pg-text-s/60 mt-6">
                PROGRESS &mdash; Espace etudiant cozy
            </p>

        </div>
    </div>

</body>
</html>
