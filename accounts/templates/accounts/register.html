{% load static %}
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRESS - Inscription</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pg': {
                            'bg':       '#F9F7F4',
                            'surface':  '#FFFFFF',
                            'border':   '#E8E5E0',
                            'accent':   '#6B8F71',
                            'accent-h': '#5A7D60',
                            'text':     '#37352F',
                            'text-s':   '#787774',
                        },
                    },
                    fontFamily: {
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(107, 143, 113, 0.12),
                        0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .cozy-bg {
            background: linear-gradient(135deg, #FDEBD0 0%, #F8D7DA 20%, #E8DAEF 40%, #D4E6F1 60%, #D5F5E3 80%, #FFF3CD 100%);
            background-size: 400% 400%;
            animation: gradientShift 18s ease infinite;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .float-shape {
            position: absolute;
            opacity: 0.12;
            animation: floatUp 22s ease-in-out infinite;
        }

        .float-shape:nth-child(odd) {
            animation-duration: 28s;
            animation-direction: reverse;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33%      { transform: translateY(-15px) rotate(4deg); }
            66%      { transform: translateY(8px) rotate(-2deg); }
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(107, 143, 113, 0.2);
            border-color: #6B8F71;
        }

        .toast-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body class="h-full cozy-bg font-sans text-pg-text antialiased overflow-y-auto relative">

    <!-- ═══ SVG Background Decorations ═══ -->
    <!-- Star -->
    <svg class="float-shape" style="top: 5%; left: 6%; width: 60px;" viewBox="0 0 60 60" fill="#A25568">
        <polygon points="30,3 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22"/>
    </svg>

    <!-- Light bulb (idea) -->
    <svg class="float-shape" style="top: 10%; right: 10%; width: 80px;" viewBox="0 0 80 100" fill="none" stroke="#8B7355" stroke-width="2.5">
        <path d="M40 10 Q60 10 60 35 Q60 55 47 60 L47 72 L33 72 L33 60 Q20 55 20 35 Q20 10 40 10 Z" stroke-linejoin="round"/>
        <line x1="33" y1="77" x2="47" y2="77"/>
        <line x1="35" y1="82" x2="45" y2="82"/>
        <!-- Rays -->
        <line x1="40" y1="0" x2="40" y2="5" stroke-width="2" opacity="0.6"/>
        <line x1="68" y1="15" x2="64" y2="18" stroke-width="2" opacity="0.6"/>
        <line x1="12" y1="15" x2="16" y2="18" stroke-width="2" opacity="0.6"/>
        <line x1="72" y1="35" x2="66" y2="35" stroke-width="2" opacity="0.6"/>
        <line x1="8" y1="35" x2="14" y2="35" stroke-width="2" opacity="0.6"/>
    </svg>

    <!-- Ruler -->
    <svg class="float-shape" style="bottom: 20%; left: 5%; width: 90px;" viewBox="0 0 30 120" fill="none" stroke="#5B7FA5" stroke-width="2">
        <rect x="2" y="2" width="26" height="116" rx="3"/>
        <line x1="2" y1="20" x2="12" y2="20" stroke-width="1.5"/>
        <line x1="2" y1="40" x2="18" y2="40" stroke-width="1.5"/>
        <line x1="2" y1="60" x2="12" y2="60" stroke-width="1.5"/>
        <line x1="2" y1="80" x2="18" y2="80" stroke-width="1.5"/>
        <line x1="2" y1="100" x2="12" y2="100" stroke-width="1.5"/>
    </svg>

    <!-- Heart -->
    <svg class="float-shape" style="bottom: 10%; right: 8%; width: 70px;" viewBox="0 0 100 90" fill="#A25568" opacity="0.3">
        <path d="M50 85 L15 50 Q0 35 0 22 Q0 5 17 5 Q30 5 38 15 L50 30 L62 15 Q70 5 83 5 Q100 5 100 22 Q100 35 85 50 Z"/>
    </svg>

    <!-- Globe -->
    <svg class="float-shape" style="top: 55%; right: 4%; width: 75px;" viewBox="0 0 80 80" fill="none" stroke="#4A7C59" stroke-width="2">
        <circle cx="40" cy="40" r="30"/>
        <ellipse cx="40" cy="40" rx="12" ry="30"/>
        <line x1="10" y1="40" x2="70" y2="40"/>
        <path d="M15 25 Q40 20 65 25" fill="none"/>
        <path d="M15 55 Q40 60 65 55" fill="none"/>
    </svg>

    <!-- Atom -->
    <svg class="float-shape" style="top: 40%; left: 2%; width: 80px;" viewBox="0 0 100 100" fill="none" stroke="#7B5EA7" stroke-width="1.5">
        <circle cx="50" cy="50" r="4" fill="#7B5EA7"/>
        <ellipse cx="50" cy="50" rx="35" ry="12" transform="rotate(0 50 50)"/>
        <ellipse cx="50" cy="50" rx="35" ry="12" transform="rotate(60 50 50)"/>
        <ellipse cx="50" cy="50" rx="35" ry="12" transform="rotate(120 50 50)"/>
    </svg>

    <!-- ═══ Main Content ═══ -->
    <div class="flex items-center justify-center min-h-full px-4 py-8 relative z-10">

        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-pg-accent rounded-2xl shadow-lg mb-3">
                    <span class="text-white font-bold text-xl">P</span>
                </div>
                <h1 class="text-2xl font-bold text-pg-text">Rejoins PROGRESS</h1>
                <p class="text-pg-text-s mt-1 text-sm">Cree ton espace etudiant en quelques secondes</p>
            </div>

            <!-- Glass Card -->
            <div class="glass rounded-2xl p-8">

                <!-- Error messages -->
                {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                    <div class="toast-enter flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm
                                {% if message.tags == 'error' %}
                                    bg-red-50 text-red-700 border border-red-200
                                {% else %}
                                    bg-green-50 text-green-700 border border-green-200
                                {% endif %}">
                        <span>{{ message }}</span>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <!-- Prénom & Nom (côte à côte) -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-pg-text mb-1">Prenom</label>
                            <input type="text" name="first_name" required
                                   value="{{ form_data.first_name|default:'' }}"
                                   placeholder="Leslye"
                                   class="w-full px-3 py-2.5 rounded-xl bg-white/70 border border-white/50
                                          text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-pg-text mb-1">Nom</label>
                            <input type="text" name="last_name" required
                                   value="{{ form_data.last_name|default:'' }}"
                                   placeholder="Nkwa"
                                   class="w-full px-3 py-2.5 rounded-xl bg-white/70 border border-white/50
                                          text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                        </div>
                    </div>

                    <!-- Username -->
                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Nom d'utilisateur</label>
                        <input type="text" name="username" required
                               value="{{ form_data.username|default:'' }}"
                               placeholder="leslye.nkwa"
                               class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">
                            Email <span class="text-pg-text-s font-normal">(optionnel)</span>
                        </label>
                        <input type="email" name="email"
                               value="{{ form_data.email|default:'' }}"
                               placeholder="leslye@ensae.sn"
                               class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <!-- Niveau -->
                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Niveau d'etudes</label>
                        <select name="level"
                                class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                       text-pg-text text-sm transition-all duration-200 appearance-none
                                       cursor-pointer">
                            {% for code, label in levels %}
                            <option value="{{ code }}" {% if form_data.level == code %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Mots de passe -->
                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Mot de passe</label>
                        <input type="password" name="password1" required
                               placeholder="8 caracteres minimum"
                               class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Confirmer le mot de passe</label>
                        <input type="password" name="password2" required
                               placeholder="••••••••"
                               class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/50
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                            class="w-full py-2.5 px-4 bg-pg-accent hover:bg-pg-accent-h text-white
                                   font-medium rounded-xl text-sm transition-all duration-200
                                   shadow-md hover:shadow-lg active:scale-[0.98]">
                        Creer mon espace
                    </button>
                </form>

                <!-- Separator -->
                <div class="flex items-center my-5">
                    <div class="flex-1 border-t border-pg-border/50"></div>
                    <span class="px-3 text-xs text-pg-text-s">ou</span>
                    <div class="flex-1 border-t border-pg-border/50"></div>
                </div>

                <!-- Login link -->
                <div class="text-center">
                    <p class="text-sm text-pg-text-s">
                        Deja un compte ?
                        <a href="{% url 'accounts:login' %}"
                           class="text-pg-accent font-medium hover:text-pg-accent-h hover:underline transition-colors">
                            Se connecter
                        </a>
                    </p>
                </div>

            </div>

            <!-- Footer -->
            <p class="text-center text-xs text-pg-text-s/60 mt-6">
                PROGRESS &mdash; Espace etudiant cozy
            </p>

        </div>
    </div>

</body>
</html>
