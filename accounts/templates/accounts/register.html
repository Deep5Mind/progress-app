{% load static %}
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRESS - Inscription</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pg': {
                            'bg':       '#FFFAFA',
                            'surface':  '#FFFFFF',
                            'border':   '#F0EBE6',
                            'accent':   '#6B8F71',
                            'accent-h': '#5A7D60',
                            'text':     '#37352F',
                            'text-s':   '#787774',
                        },
                        'peach':    '#B07D56',
                        'lavender': '#7B5EA7',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(240, 235, 230, 0.6);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(107, 143, 113, 0.15);
            border-color: #6B8F71;
        }

        .toast-enter {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body class="h-full bg-[#FFFAFA] font-sans text-pg-text antialiased overflow-y-auto relative">

    <!-- Icône café (statique, en haut à gauche) -->
    <svg style="position: absolute; top: 6%; left: 6%; width: 110px; opacity: 0.10;" viewBox="0 0 120 120" fill="none">
        <rect x="20" y="40" width="55" height="50" rx="8" stroke="#B07D56" stroke-width="3" fill="none"/>
        <path d="M75 52 Q95 52 95 67 Q95 82 75 82" stroke="#B07D56" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="47" cy="95" rx="38" ry="6" stroke="#B07D56" stroke-width="2.5" fill="none"/>
        <path d="M35 35 Q37 25 35 18" stroke="#B07D56" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M47 32 Q49 22 47 14" stroke="#B07D56" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M59 35 Q61 25 59 18" stroke="#B07D56" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>

    <!-- Icône réveil (statique, en bas à droite) -->
    <svg style="position: absolute; bottom: 5%; right: 6%; width: 120px; opacity: 0.08;" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="62" r="35" stroke="#7B5EA7" stroke-width="3" fill="none"/>
        <circle cx="60" cy="62" r="2.5" fill="#7B5EA7"/>
        <line x1="60" y1="62" x2="60" y2="42" stroke="#7B5EA7" stroke-width="3" stroke-linecap="round"/>
        <line x1="60" y1="62" x2="75" y2="55" stroke="#7B5EA7" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="35" y1="93" x2="42" y2="87" stroke="#7B5EA7" stroke-width="3" stroke-linecap="round"/>
        <line x1="85" y1="93" x2="78" y2="87" stroke="#7B5EA7" stroke-width="3" stroke-linecap="round"/>
        <circle cx="38" cy="32" r="9" stroke="#7B5EA7" stroke-width="2.5" fill="none"/>
        <circle cx="82" cy="32" r="9" stroke="#7B5EA7" stroke-width="2.5" fill="none"/>
        <line x1="45" y1="28" x2="60" y2="27" stroke="#7B5EA7" stroke-width="2"/>
        <line x1="75" y1="28" x2="60" y2="27" stroke="#7B5EA7" stroke-width="2"/>
    </svg>

    <!-- Contenu principal -->
    <div class="flex items-center justify-center min-h-full px-4 py-8 relative z-10">

        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-pg-accent rounded-2xl shadow-lg mb-3">
                    <span class="text-white font-bold text-xl">P</span>
                </div>
                <h1 class="text-2xl font-bold text-pg-text">Rejoins PROGRESS</h1>
                <p class="text-pg-text-s mt-1 text-sm">Crée ton espace étudiant en quelques secondes</p>
            </div>

            <!-- Glass Card -->
            <div class="glass rounded-2xl p-8">

                {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                    <div class="toast-enter flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm
                                {% if message.tags == 'error' %}
                                    bg-red-50 text-red-700 border border-red-200
                                {% else %}
                                    bg-green-50 text-green-700 border border-green-200
                                {% endif %}">
                        <span>{{ message }}</span>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-pg-text mb-1">Prénom</label>
                            <input type="text" name="first_name" required
                                   value="{{ form_data.first_name|default:'' }}"
                                   placeholder="Leslye"
                                   class="w-full px-3 py-2.5 rounded-xl bg-white border border-pg-border
                                          text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-pg-text mb-1">Nom</label>
                            <input type="text" name="last_name" required
                                   value="{{ form_data.last_name|default:'' }}"
                                   placeholder="Nkwa"
                                   class="w-full px-3 py-2.5 rounded-xl bg-white border border-pg-border
                                          text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Nom d'utilisateur</label>
                        <input type="text" name="username" required
                               value="{{ form_data.username|default:'' }}"
                               placeholder="leslye.nkwa"
                               class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">
                            Email <span class="text-pg-text-s font-normal">(optionnel)</span>
                        </label>
                        <input type="email" name="email"
                               value="{{ form_data.email|default:'' }}"
                               placeholder="leslye@ensae.sn"
                               class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Classe</label>
                        <select name="level"
                                class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                       text-pg-text text-sm transition-all duration-200 appearance-none cursor-pointer">
                            {% for code, label in levels %}
                            <option value="{{ code }}" {% if form_data.level == code %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Mot de passe</label>
                        <input type="password" name="password1" required
                               placeholder="8 caractères minimum"
                               class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-pg-text mb-1">Confirmer le mot de passe</label>
                        <input type="password" name="password2" required
                               placeholder="••••••••"
                               class="w-full px-4 py-2.5 rounded-xl bg-white border border-pg-border
                                      text-pg-text placeholder-pg-text-s/50 text-sm transition-all duration-200">
                    </div>

                    <button type="submit"
                            class="w-full py-2.5 px-4 bg-pg-accent hover:bg-pg-accent-h text-white
                                   font-medium rounded-xl text-sm transition-all duration-200
                                   shadow-sm hover:shadow-md active:scale-[0.98]">
                        Créer mon espace
                    </button>
                </form>

                <div class="flex items-center my-5">
                    <div class="flex-1 border-t border-pg-border"></div>
                    <span class="px-3 text-xs text-pg-text-s">ou</span>
                    <div class="flex-1 border-t border-pg-border"></div>
                </div>

                <div class="text-center">
                    <p class="text-sm text-pg-text-s">
                        Déjà un compte ?
                        <a href="{% url 'accounts:login' %}"
                           class="text-pg-accent font-medium hover:text-pg-accent-h hover:underline transition-colors">
                            Se connecter
                        </a>
                    </p>
                </div>

            </div>

            <p class="text-center text-xs text-pg-text-s/50 mt-6">
                PROGRESS &mdash; Espace étudiant cozy
            </p>

        </div>
    </div>

</body>
</html>
