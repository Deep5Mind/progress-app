<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- SIDEBAR - Navigation latérale style Notion                     -->
<!-- Largeur fixe 240px, fond clair, navigation entre les onglets   -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<aside
    class="fixed top-0 left-0 h-full w-60 bg-pg-sidebar border-r border-pg-border flex flex-col z-40"
    x-show="sidebarOpen"
    x-transition:enter="transition-transform duration-200 ease-out"
    x-transition:enter-start="-translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition-transform duration-150 ease-in"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="-translate-x-full"
>

    <!-- ── Logo & Nom ── -->
    <div class="flex items-center gap-2.5 px-4 py-4 border-b border-pg-border">
        <!-- Logo P dans un carré arrondi style Notion -->
        <div class="w-7 h-8 bg-pg-text rounded-md flex items-center justify-center">
            <span class="text-white font-bold text-sm tracking-tight">P</span>
        </div>
        <div>
            <h1 class="text-sm font-semibold text-pg-text leading-tight">PROGRESS</h1>
            <p class="text-xxs text-pg-text-s leading-tight">Espace étudiant</p>
        </div>
    </div>

    <!-- ── Navigation principale ── -->
    <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">

        <!-- Section label -->
        <p class="px-2 pt-3 pb-1.5 text-xxs font-medium text-pg-text-xs uppercase tracking-wider">
            Navigation
        </p>

        <!-- Onglet 1 : Tableau de Bord -->
        <a href="{% url 'dashboard:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm
                  {% if request.resolver_match.app_name == 'dashboard' %}
                      bg-pg-hover text-pg-text font-medium
                  {% else %}
                      text-pg-text-s hover:bg-pg-hover hover:text-pg-text
                  {% endif %}">
            <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Tableau de bord</span>
        </a>

        <!-- Onglet 2 : Notes & Analyses -->
        <a href="{% url 'grades:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm
                  {% if request.resolver_match.app_name == 'grades' %}
                      bg-pg-hover text-pg-text font-medium
                  {% else %}
                      text-pg-text-s hover:bg-pg-hover hover:text-pg-text
                  {% endif %}">
            <i data-lucide="book-open" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Notes & Analyses</span>
        </a>

        <!-- Onglet 3 : Calendrier -->
        <a href="{% url 'calendar:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm
                  {% if request.resolver_match.app_name == 'calendar' %}
                      bg-pg-hover text-pg-text font-medium
                  {% else %}
                      text-pg-text-s hover:bg-pg-hover hover:text-pg-text
                  {% endif %}">
            <i data-lucide="calendar-days" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Calendrier</span>
        </a>

        <!-- Onglet 4 : Contacts & Documents -->
        <a href="{% url 'contacts:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm
                  {% if request.resolver_match.app_name == 'contacts' %}
                      bg-pg-hover text-pg-text font-medium
                  {% else %}
                      text-pg-text-s hover:bg-pg-hover hover:text-pg-text
                  {% endif %}">
            <i data-lucide="contact" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Contacts & Docs</span>
        </a>

        <!-- Séparateur -->
        <div class="border-t border-pg-border my-3 mx-2"></div>

        <!-- Section label -->
        <p class="px-2 pt-1 pb-1.5 text-xxs font-medium text-pg-text-xs uppercase tracking-wider">
            Raccourcis
        </p>

        <!-- Lien rapide : Ajouter une note -->
        <a href="{% url 'grades:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm text-pg-text-s hover:bg-pg-hover hover:text-pg-text">
            <i data-lucide="plus-circle" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Ajouter une note</span>
        </a>

        <!-- Lien rapide : Ajouter un événement -->
        <a href="{% url 'calendar:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm text-pg-text-s hover:bg-pg-hover hover:text-pg-text">
            <i data-lucide="calendar-plus" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Ajouter un événement</span>
        </a>

    </nav>

    <!-- ── Pied de sidebar ── -->
    <div class="px-2 py-3 border-t border-pg-border space-y-0.5">
        <a href="{% url 'settings:index' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm
                  {% if request.resolver_match.app_name == 'settings' %}
                      bg-pg-hover text-pg-text font-medium
                  {% else %}
                      text-pg-text-s hover:bg-pg-hover hover:text-pg-text
                  {% endif %}">
            <i data-lucide="settings" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Paramètres</span>
        </a>

        {% if user.is_authenticated %}
        <div class="flex items-center gap-2.5 px-2.5 py-1.5 text-sm text-pg-text-s">
            <i data-lucide="user" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span class="truncate">{{ user.first_name|default:user.username }}</span>
        </div>
        <a href="{% url 'accounts:logout' %}"
           class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-md text-sm text-pg-text-s hover:bg-pg-hover hover:text-red-500">
            <i data-lucide="log-out" class="w-4 h-4 shrink-0" stroke-width="1.5"></i>
            <span>Déconnexion</span>
        </a>
        {% endif %}
    </div>
</aside>
