<!-- TOAST - Notifications de feedback (succès, erreur, info)       -->
<!-- Utilise Alpine.js pour l'affichage/masquage automatique        -->
<!-- ═══════════════════════════════════════════════════════════════ -->

{% if messages %}
<div class="fixed bottom-6 right-6 z-50 space-y-2">
    {% for message in messages %}
    <div
        x-data="{ show: true }"
        x-init="{% if message.tags != 'info' %}setTimeout(() => show = false, 3500){% endif %}"
        x-show="show"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-2"
        class="flex items-start gap-2.5 px-4 py-3 rounded-lg shadow-lg border text-sm max-w-md
               {% if message.tags == 'success' %}
                   bg-green-50 border-green-200 text-green-800
               {% elif message.tags == 'error' %}
                   bg-red-50 border-red-200 text-red-800
               {% elif message.tags == 'warning' %}
                   bg-yellow-50 border-yellow-200 text-yellow-800
               {% else %}
                   bg-pastel-violet/20 border-pastel-violet text-pg-text
               {% endif %}"
    >
        {% if message.tags == 'success' %}
            <i data-lucide="check-circle-2" class="w-4 h-4 shrink-0 text-green-500" stroke-width="1.5"></i>
        {% elif message.tags == 'error' %}
            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 text-red-500" stroke-width="1.5"></i>
        {% elif message.tags == 'warning' %}
            <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0 text-yellow-500" stroke-width="1.5"></i>
        {% else %}
            <i data-lucide="info" class="w-4 h-4 shrink-0 text-pg-text-s" stroke-width="1.5"></i>
        {% endif %}
        <span>{{ message|linebreaksbr }}</span>
        <button @click="show = false" class="ml-2 text-current opacity-50 hover:opacity-100">
            <i data-lucide="x" class="w-3.5 h-3.5" stroke-width="1.5"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
